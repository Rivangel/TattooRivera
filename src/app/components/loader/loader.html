@if (!isHidden()) {
<div class="loader-overlay" [class.leave]="isLeaving()">
    <div class="loader-centerpiece">
        <div class="iron-circle"></div>

        <div class="gothic-crest">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="cold-steel" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#b0b5b9" />
                        <stop offset="50%" stop-color="#54585a" />
                        <stop offset="100%" stop-color="#1c1e1f" />
                    </linearGradient>
                    <linearGradient id="dark-silver" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#4a4c4f" />
                        <stop offset="100%" stop-color="#222324" />
                    </linearGradient>
                </defs>

                <g class="tattoo-needles">
                    <line x1="15" y1="15" x2="85" y2="85" stroke="url(#cold-steel)" stroke-width="3"
                        stroke-linecap="round" />
                    <circle cx="15" cy="15" r="4" fill="none" stroke="url(#cold-steel)" stroke-width="2" />
                    <polygon points="80,80 85,85 90,80 85,95" fill="url(#cold-steel)" />

                    <line x1="85" y1="15" x2="15" y2="85" stroke="url(#cold-steel)" stroke-width="3"
                        stroke-linecap="round" />
                    <circle cx="85" cy="15" r="4" fill="none" stroke="url(#cold-steel)" stroke-width="2" />
                    <polygon points="20,80 15,85 10,80 15,95" fill="url(#cold-steel)" />
                </g>

                <circle class="thorn-path" cx="50" cy="50" r="35" fill="none" stroke="url(#dark-silver)"
                    stroke-width="1.5" />

                <g class="thorns">
                    <polygon points="50,15 52,10 48,12" fill="url(#dark-silver)" />
                    <polygon points="85,50 90,48 88,52" fill="url(#dark-silver)" />
                    <polygon points="50,85 48,90 52,88" fill="url(#dark-silver)" />
                    <polygon points="15,50 10,52 12,48" fill="url(#dark-silver)" />
                </g>
            </svg>
        </div>
    </div>

    <div class="loader-text">Rivera Tattoo</div>

    <div class="loader-count" aria-hidden="true">{{ progress() }}</div>
</div>
}
