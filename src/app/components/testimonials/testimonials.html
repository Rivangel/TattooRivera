@if (testimonials.length > 0) {
<section id="testimonials" class="testimonials-section">
    <div class="testimonials-wrapper">

        <header class="section-head">
            <span class="section-eyebrow">Clientes reales</span>
            <h2 class="section-title angel-wish">Lo que dicen de nosotros</h2>
        </header>

        <!-- Río infinito de testimonios: se pausa al hover -->
        <div class="testimonials-marquee">
            <div class="marquee-track">
                @for (copy of copies; track copy) {
                <div class="marquee-group" [attr.aria-hidden]="copy === 1">
                    @for (item of testimonials; track item.author) {
                    <article class="testimonial-card">
                        @if (item.image) {
                        <div class="testimonial-image" [style.backgroundImage]="'url(' + item.image + ')'"></div>
                        }
                        <blockquote class="testimonial-quote">“{{ item.quote }}”</blockquote>
                        <footer class="testimonial-meta">
                            <span class="testimonial-author">{{ item.author }}</span>
                            <span class="testimonial-detail">{{ item.detail }}</span>
                        </footer>
                    </article>
                    }
                </div>
                }
            </div>
        </div>

    </div>
</section>
}
